name: CI/CD Pipeline
on:
  pull_request:
    branches: [ uat ]
  push:
    branches: [ uat, main, 'release-v*' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r app/requirements.txt -r requirements-dev.txt
      - run: pytest app/test_main.py

  deploy-uat:
    needs: test
    if: github.ref == 'refs/heads/uat'
    runs-on: ubuntu-latest
    environment: uat
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker --quiet
      - uses: hashicorp/setup-terraform@v3
      - run: make deploy ENV=uat

  create-release:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version and create release branch
        run: |
          LATEST=$(git branch -r --list 'origin/release-v*' --sort=-version:refname | head -1 | xargs)
          if [ -z "$LATEST" ]; then
            VERSION="v1"
            PATCH=0
          else
            VERSION=$(echo "$LATEST" | sed 's|origin/release-\(v[0-9]*\)-.*|\1|')
            LAST_PATCH=$(echo "$LATEST" | sed 's|origin/release-v[0-9]*-\([0-9]*\)-.*|\1|')
            PATCH=$((LAST_PATCH + 1))
          fi
          BRANCH="release-${VERSION}-${PATCH}-$(date +'%Y%m%d')"
          echo "Creating branch: $BRANCH"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

  deploy-prod:
    needs: test
    if: startsWith(github.ref, 'refs/heads/release-v')
    runs-on: ubuntu-latest
    environment: prod
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker --quiet
      - uses: hashicorp/setup-terraform@v3
      - run: make deploy ENV=prod
